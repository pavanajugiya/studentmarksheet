<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catch the Box Game</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        #gameArea {
            width: 400px;
            height: 400px;
            margin: 20px auto;
            background: white;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
        }

        #box {
            width: 50px;
            height: 50px;
            background: red;
            position: absolute;
            cursor: pointer;
            border-radius: 8px;
        }

        #info {
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #ff9800;
            color: white;
        }
    </style>
</head>

<body>

    <h1>🎯 Catch the Box</h1>

    <div id="info">
        Score: <span id="score">0</span> |
        Time: <span id="time">30</span>
    </div>

    <button onclick="startGame()">Start Game</button>

    <div id="gameArea">
        <div id="box"></div>
    </div>

    <script>
        let score = 0;
        let time = 30;
        let gameInterval;
        let moveInterval;

        const box = document.getElementById("box");
        const scoreDisplay = document.getElementById("score");
        const timeDisplay = document.getElementById("time");
        const gameArea = document.getElementById("gameArea");

        // Move box randomly
        function moveBox() {
            const maxX = gameArea.clientWidth - box.clientWidth;
            const maxY = gameArea.clientHeight - box.clientHeight;

            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            box.style.left = x + "px";
            box.style.top = y + "px";
        }

        // Click box
        box.addEventListener("click", () => {
            score++;
            scoreDisplay.textContent = score;
            moveBox();
        });

        // Start game
        function startGame() {
            score = 0;
            time = 30;
            scoreDisplay.textContent = score;
            timeDisplay.textContent = time;

            moveBox();

            moveInterval = setInterval(moveBox, 800);

            gameInterval = setInterval(() => {
                time--;
                timeDisplay.textContent = time;

                if (time <= 0) {
                    clearInterval(gameInterval);
                    clearInterval(moveInterval);
                    alert("Game Over! Your score is " + score);
                }
            }, 1000);
        }
    </script>

</body>
</html>
