<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #667eea, #764ba2);
        text-align: center;
        color: white;
        margin: 0;
        padding: 0;
    }

    h1 {
        margin-top: 30px;
    }

    .game {
        margin-top: 40px;
    }

    button {
        padding: 15px 25px;
        margin: 10px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
    }

    .rock { background-color: #ff6b6b; }
    .paper { background-color: #4ecdc4; }
    .scissors { background-color: #ffe66d; color: black; }

    .result {
        margin-top: 30px;
        font-size: 22px;
    }

    .score {
        margin-top: 20px;
        font-size: 20px;
    }
</style>
</head>

<body>

<h1>🎮 Rock Paper Scissors</h1>

<div class="game">
    <button class="rock" onclick="playGame('rock')">🪨 Rock</button>
    <button class="paper" onclick="playGame('paper')">📄 Paper</button>
    <button class="scissors" onclick="playGame('scissors')">✂️ Scissors</button>
</div>

<div class="result" id="result">Choose your move!</div>
<div class="score" id="score">You: 0 | Computer: 0</div>

<script>
    let userScore = 0;
    let computerScore = 0;

    function playGame(userChoice) {
        const choices = ['rock', 'paper', 'scissors'];
        const computerChoice = choices[Math.floor(Math.random() * 3)];

        let resultText = `You chose ${userChoice}, Computer chose ${computerChoice}. `;

        if (userChoice === computerChoice) {
            resultText += "It's a Draw!";
        } else if (
            (userChoice === 'rock' && computerChoice === 'scissors') ||
            (userChoice === 'paper' && computerChoice === 'rock') ||
            (userChoice === 'scissors' && computerChoice === 'paper')
        ) {
            resultText += "You Win!";
            userScore++;
        } else {
            resultText += "You Lose!";
            computerScore++;
        }

        document.getElementById("result").innerText = resultText;
        document.getElementById("score").innerText = `You: ${userScore} | Computer: ${computerScore}`;
    }
</script>

</body>
</html>
